{# Tab Progetti — lista progetti associati al soggetto #}
{% if progetti %}
<div class="space-y-3">
  {% for p in progetti %}
  <a href="/progetti/{{ p.id }}" class="block bg-white rounded-xl border border-gray-200 p-5 hover:shadow-md transition-shadow">
    <div class="flex items-center justify-between">
      <div>
        <h3 class="text-sm font-semibold text-gray-900">{{ p.nome }}</h3>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-xs text-gray-500">{{ p.n_candidature or 0 }} candidatur{{ 'a' if p.n_candidature == 1 else 'e' }}</span>
        <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
        </svg>
      </div>
    </div>
  </a>
  {% endfor %}
</div>
{% else %}
<div class="text-center py-12">
  <svg class="mx-auto w-12 h-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/>
  </svg>
  <p class="mt-3 text-sm text-gray-500">Nessun progetto associato a questo soggetto</p>
  <a href="/progetti" class="mt-2 inline-flex text-sm text-blue-600 hover:text-blue-700">Vai ai progetti</a>
</div>
{% endif %}
