{# Tab component — HTMX powered #}

{% macro tab_bar(tabs, active_tab, base_url, query_string="") %}
<div class="border-b border-gray-200">
  <nav class="flex gap-1 px-1" role="tablist">
    {% for key, label in tabs %}
    <button
      hx-get="{{ base_url }}/tab/{{ key }}{% if query_string %}?{{ query_string }}{% endif %}"
      hx-target="#tab-content"
      hx-swap="innerHTML"
      class="px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors
             {% if active_tab == key %}
               text-blue-700 bg-blue-50 border-b-2 border-blue-700
             {% else %}
               text-gray-500 hover:text-gray-700 hover:bg-gray-50
             {% endif %}"
      role="tab"
      {% if active_tab == key %}aria-selected="true"{% endif %}
      onclick="this.parentElement.querySelectorAll('[role=tab]').forEach(t => {
        t.classList.remove('text-blue-700','bg-blue-50','border-b-2','border-blue-700');
        t.classList.add('text-gray-500');
      });
      this.classList.add('text-blue-700','bg-blue-50','border-b-2','border-blue-700');
      this.classList.remove('text-gray-500');"
    >
      {{ label }}
    </button>
    {% endfor %}
  </nav>
</div>
{% endmacro %}
