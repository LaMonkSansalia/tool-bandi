{% extends "layout.html" %}

{% block title %}Nuovo Soggetto — Tool Bandi{% endblock %}
{% block page_title %}Nuovo Soggetto{% endblock %}

{% block content %}
<nav class="text-sm text-gray-500 mb-6">
  <a href="/soggetti" class="hover:text-gray-700">Soggetti</a>
  <span class="mx-1">/</span>
  <span class="text-gray-900">Nuovo</span>
</nav>

<div class="max-w-2xl">
  <form method="post" action="/soggetti/nuovo" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nome *</label>
      <input type="text" name="nome" required
             class="w-full rounded-lg border-gray-300 text-sm focus:ring-blue-500 focus:border-blue-500"
             placeholder="Es. La Monica Luciano">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Forma Giuridica</label>
        <select name="forma_giuridica" class="w-full rounded-lg border-gray-300 text-sm">
          <option value="">Seleziona...</option>
          <option value="impresa_individuale">Impresa Individuale</option>
          <option value="srl">SRL</option>
          <option value="srls">SRLS</option>
          <option value="snc">SNC</option>
          <option value="sas">SAS</option>
          <option value="cooperativa">Cooperativa</option>
          <option value="associazione">Associazione</option>
          <option value="fondazione">Fondazione</option>
          <option value="consorzio">Consorzio</option>
          <option value="ente_pubblico">Ente Pubblico</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Regime Fiscale</label>
        <select name="regime_fiscale" class="w-full rounded-lg border-gray-300 text-sm">
          <option value="">Seleziona...</option>
          <option value="forfettario">Forfettario</option>
          <option value="ordinario">Ordinario</option>
          <option value="semplificato">Semplificato</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Codice ATECO</label>
        <input type="text" name="ateco" class="w-full rounded-lg border-gray-300 text-sm" placeholder="62.01.00">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">P.IVA</label>
        <input type="text" name="piva" class="w-full rounded-lg border-gray-300 text-sm" placeholder="IT12345678901">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Sede</label>
      <input type="text" name="sede" class="w-full rounded-lg border-gray-300 text-sm" placeholder="Palermo, PA">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Dipendenti</label>
        <input type="number" name="dipendenti" value="0" min="0"
               class="w-full rounded-lg border-gray-300 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Anno Costituzione</label>
        <input type="number" name="anno_costituzione" placeholder="2020"
               class="w-full rounded-lg border-gray-300 text-sm">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Fatturato (EUR)</label>
      <input type="number" name="fatturato" placeholder="50000"
             class="w-full rounded-lg border-gray-300 text-sm">
    </div>

    <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
      <a href="/soggetti" class="px-4 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50">Annulla</a>
      <button type="submit" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">Crea Soggetto</button>
    </div>
  </form>
</div>
{% endblock %}
