# tool-bandi — FastAPI web UI
# NPM target: bandi_ui:8000 (same container name as old Django for NPM compat)
# DB volume: bandi-ui_pgdata (reused from Django deployment)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bandi_ui
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks: [npm_default, internal]

  db:
    image: pgvector/pgvector:pg16
    container_name: bandi_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-bandi_db}
      POSTGRES_USER: ${DB_USER:-bandi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obbligatoria in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./engine/db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bandi} -d ${DB_NAME:-bandi_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    networks: [internal]

volumes:
  pgdata:
    external: true
    name: bandi-ui_pgdata

networks:
  npm_default:
    external: true
  internal:
    internal: true
