services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bandi_db
      POSTGRES_USER: bandi
      POSTGRES_PASSWORD: bandi
    volumes:
      - bandi_postgres:/var/lib/postgresql/data
    networks:
      - bandi_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bandi -d bandi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - bandi_net

  prefect:
    image: prefecthq/prefect:3-latest
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0
    networks:
      - bandi_net
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ..:/app
    networks:
      - bandi_net
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  bandi_postgres:

networks:
  bandi_net:
